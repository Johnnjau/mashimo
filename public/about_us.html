<!DOCTYPE html>
<html>
<head>
    <title>About Us</title>
    <style>
        /* Some basic CSS for styling */
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>About Us</h1>
        <p>We are a passionate team dedicated to creating amazing websites.</p>
        
        <button id="showMessageButton">Click me!</button>
        <p id="message" style="display: none;">Thanks for clicking! We hope you enjoy our website.</p>
    </div>

    <script>
        // JavaScript code
        // When the button is clicked, show the hidden message
        document.getElementById("showMessageButton").addEventListener("click", function() {
            var message = document.getElementById("message");
            message.style.display = "block";
        });
    </script>
</body>
</html>
